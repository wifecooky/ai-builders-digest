<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0a0e17"/>
  <!-- Outer hexagon -->
  <polygon points="16,4 27,10 27,22 16,28 5,22 5,10" fill="none" stroke="#818cf8" stroke-width="2" stroke-linejoin="round" opacity="0.7"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="6.5" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
  <!-- Glow -->
  <circle cx="16" cy="16" r="8" fill="url(#glow)"/>
  <!-- Core dot -->
  <circle cx="16" cy="16" r="3.5" fill="#818cf8"/>
  <circle cx="16" cy="16" r="2" fill="#c7d2fe"/>
