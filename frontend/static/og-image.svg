<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2f4a" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0e17"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Border frame -->
  <rect x="30" y="30" width="1140" height="570" rx="8" fill="none" stroke="#1e2f4a" stroke-width="1"/>

  <!-- Corner brackets -->
  <path d="M50 75 L50 50 L75 50" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
  <path d="M1150 75 L1150 50 L1125 50" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
  <path d="M50 555 L50 580 L75 580" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
  <path d="M1150 555 L1150 580 L1125 580" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.6"/>

  <!-- Hexagon icon (scaled up) -->
  <g transform="translate(600, 210)">
    <polygon points="0,-70 61,-35 61,35 0,70 -61,35 -61,-35" fill="none" stroke="#818cf8" stroke-width="3" stroke-linejoin="round" opacity="0.6"/>
    <polygon points="0,-45 39,-22.5 39,22.5 0,45 -39,22.5 -39,-22.5" fill="none" stroke="#818cf8" stroke-width="2" stroke-linejoin="round" opacity="0.3"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.4"/>
    <circle cx="0" cy="0" r="12" fill="#818cf8" opacity="0.9"/>
    <circle cx="0" cy="0" r="6" fill="#c7d2fe"/>
  </g>

  <!-- Title -->
  <text x="600" y="350" text-anchor="middle" fill="#ffffff" font-family="'Orbitron', 'JetBrains Mono', monospace" font-size="48" font-weight="700" letter-spacing="10">AI BUILDERS BRIEF</text>

  <!-- Subtitle -->
  <text x="600" y="395" text-anchor="middle" fill="#818cf8" font-family="'JetBrains Mono', monospace" font-size="18" letter-spacing="6" opacity="0.7">FOLLOW BUILDERS, NOT INFLUENCERS</text>

  <!-- Separator -->
  <line x1="200" y1="440" x2="1000" y2="440" stroke="url(#sep)" stroke-width="1.5"/>

  <!-- Stats -->
  <text x="600" y="490" text-anchor="middle" fill="#6b85a5" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="5">25+ BUILDERS  ·  PODCASTS  ·  BLOGS  ·  DAILY</text>
</svg>
