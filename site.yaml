# site.yaml — AI Builders Digest
# ── Identity ──
site:
  id: builders
  url: https://builders.ai.thewang.net
  title:
    en: 'AI Builders Brief'
    zh: 'AI 实干派'
    ja: 'AI Builders Brief'
  subtitle:
    en: 'Follow builders, not influencers.'
    zh: '只追实干者，不追网红'
    ja: '作る人を追え、語るだけの人ではなく。'
  description:
    en: 'Daily digest tracking 25+ AI builders on X/Twitter, podcasts, and company blogs.'
    zh: '每天追踪 25+ 位真正在做事的 AI 从业者，覆盖 X/Twitter、播客和技术博客。'
    ja: 'X/Twitter・ポッドキャスト・ブログで活躍する25人以上のAIビルダーの動向を毎日お届け。'
  keywords:
    en: 'AI builders, AI news, builder insights, AI podcasts, daily digest'
    zh: 'AI实干派, AI动态, 建设者洞察, AI播客, 每日简报'
    ja: 'AIビルダー, AI動向, ビルダーインサイト, AIポッドキャスト, デイリーダイジェスト'
  hashtag:
    en: '#AIBuildersDigest'
    zh: '#AI实干派'
    ja: '#AIBuildersDigest'

# ── Theme ──
theme:
  style: brief
  fonts:
    display: "'Sora', 'Noto Sans SC', 'Noto Sans JP', sans-serif"
    sans: "'IBM Plex Sans', 'Noto Sans SC', 'Noto Sans JP', system-ui, sans-serif"
    mono: "'JetBrains Mono', ui-monospace, monospace"
    google: "family=Sora:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700"
  colors:
    dark:
      bg: '#0c1017'
      surface: '#141820'
      surface2: '#1c2028'
      border: '#282e38'
      borderGlow: '#3b82f615'
      text: '#b8c0d0'
      textMuted: '#6a7590'
      accent: '#60a5fa'
      secondary: '#94a3b8'
      green: '#4ade80'
      amber: '#fbbf24'
      heading: '#e8edf6'
    light:
      bg: '#fafbfd'
      surface: '#ffffff'
      surface2: '#f0f2f5'
      border: '#d1d5db'
      borderGlow: '#3b82f615'
      text: '#1e293b'
      textMuted: '#64748b'
      accent: '#2563eb'
      secondary: '#64748b'
      green: '#16a34a'
      amber: '#ca8a04'
      heading: '#0f172a'

# ── Data Sources ──
sources:
  feeds:
    x: 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-x.json'
    podcasts: 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-podcasts.json'
    blogs: 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-blogs.json'

# ── Editorial ──
editorial:
  prompt: config/prompts/editorial.md
  max_builders: 15
  max_podcasts: 2
  max_blogs: 3

# ── Labels ──
labels:
  builderInsights: { en: 'BUILDER INSIGHTS', zh: '实干者说', ja: 'ビルダーの声' }
  podcastHighlights: { en: 'PODCAST HIGHLIGHTS', zh: '播客精选', ja: 'ポッドキャスト' }
  blogUpdates: { en: 'BLOG UPDATES', zh: '官方博客', ja: '公式ブログ' }
  archive: { en: 'ARCHIVE', zh: '往期', ja: 'アーカイブ' }
  backToday: { en: 'BACK TO TODAY', zh: '返回今日', ja: '今日に戻る' }
  empty: { en: 'NO UPDATES TODAY.', zh: '// 今日无更新', ja: '// 本日の更新はありません' }
  sources: { en: 'builders tracked', zh: '位建设者已追踪', ja: '人のビルダーを追跡中' }
  fromSources: { en: 'SRC', zh: '来源', ja: 'ソース' }
  subscribe: { en: 'SUBSCRIBE', zh: '订阅', ja: '購読する' }
  emailPlaceholder: { en: 'you@example.com', zh: '你的邮箱', ja: 'メールアドレス' }
  stayUpdated: { en: 'STAY UPDATED', zh: '保持关注', ja: '最新情報を購読' }
  stayUpdatedDesc:
    en: 'Daily builder insights, straight to your inbox.'
    zh: '每日建设者洞察，直达邮箱。'
    ja: 'ビルダーの最新動向を毎日メールでお届けします。'
  cta: { en: 'READ FULL DIGEST', zh: '阅读完整日报', ja: '全文を読む' }

# ── Sponsor (optional) ──
sponsor: null

# ── Newsletter (optional) ──
newsletter:
  provider: buttondown
  username: thewang

# ── About Page ──
about:
  title: { en: 'HOW IT WORKS', zh: '运作方式', ja: '仕組み' }
  overview:
    en: 'This digest tracks 25+ top AI builders across X/Twitter, podcasts, and blogs. Every day, the system fetches content from curated feeds, remixes it with AI into structured summaries, and translates to three languages.'
    zh: '本日报追踪 25+ 位顶级 AI 建设者在 X/Twitter、播客和博客上的动态。系统每天从策划的信息源获取内容，通过 AI 生成结构化摘要，并翻译为三种语言。'
    ja: 'X/Twitter・ポッドキャスト・ブログで活躍するトップAIビルダー25人以上を毎日追跡。厳選フィードからコンテンツを収集し、AIで構造化された要約を作成、3言語に翻訳してお届けします。'
  policyAudience:
    en: 'Target audience: builders, engineers, and founders in AI.'
    zh: '目标读者：AI 领域的建设者、工程师和创始人。'
    ja: '対象読者：AI分野のビルダー、エンジニア、創業者。'
  disclaimer:
    en: 'Summaries are generated by AI and may contain inaccuracies. All original content belongs to their respective creators.'
    zh: '摘要由 AI 生成，可能存在不准确之处。所有原始内容版权归各自创作者所有。'
    ja: '要約はAIにより生成されており、不正確な内容を含む場合があります。すべてのオリジナルコンテンツの権利は各クリエイターに帰属します。'

# ── Schedule ──
schedule:
  cron: '0 7 * * *'
