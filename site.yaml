# site.yaml — AI Builders Digest
# ── Identity ──
site:
  id: builders
  url: https://builders.ai.thewang.net
  title:
    en: 'AI Builders Brief'
    zh: 'AI 实干派'
    ja: 'AIつくる人の日報'
  subtitle:
    en: 'Follow builders, not influencers.'
    zh: '只追实干者，不追网红'
    ja: '作る人を追え。語るだけの人じゃなく。'
  description:
    en: 'Daily digest tracking 25+ AI builders on X/Twitter, podcasts, and company blogs.'
    zh: '每天追踪 25+ 位真正在做事的 AI 从业者，覆盖 X/Twitter、播客和技术博客。'
    ja: 'X/Twitter、ポッドキャスト、ブログで活躍するAIビルダー25人以上の動向を毎日お届け。'
  keywords:
    en: 'AI builders, AI news, builder insights, AI podcasts, daily digest'
    zh: 'AI实干派, AI动态, 建设者洞察, AI播客, 每日简报'
    ja: 'AIビルダー, AI動向, ビルダーインサイト, AIポッドキャスト, デイリーダイジェスト'
  hashtag:
    en: '#AIBuildersDigest'
    zh: '#AI实干派'
    ja: '#AIBuildersBrief'

# ── Theme ──
theme:
  style: cyber
  fonts:
    display: "'Orbitron', 'JetBrains Mono', monospace"
    sans: "'JetBrains Mono', 'Noto Sans SC', 'Noto Sans JP', ui-monospace, monospace"
    mono: "'JetBrains Mono', ui-monospace, monospace"
    google: "family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700"
  colors:
    dark:
      bg: '#0a0e17'
      surface: '#0f1524'
      surface2: '#141d32'
      border: '#1e2f4a'
      borderGlow: '#6366f133'
      text: '#c8d6e5'
      textMuted: '#6b85a5'
      accent: '#818cf8'
      secondary: '#f472b6'
      green: '#34d399'
      amber: '#fbbf24'
      heading: '#ffffff'
    light:
      bg: '#f5f3ff'
      surface: '#ffffff'
      surface2: '#ede9fe'
      border: '#c4b5fd'
      borderGlow: '#6366f133'
      text: '#1e1b4b'
      textMuted: '#6b7280'
      accent: '#4f46e5'
      secondary: '#db2777'
      green: '#059669'
      amber: '#d97706'
      heading: '#0f0d29'

# ── Data Sources ──
sources:
  feeds:
    x: 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-x.json'
    podcasts: 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-podcasts.json'
    blogs: 'https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-blogs.json'

# ── Editorial ──
editorial:
  prompt: config/prompts/editorial.md
  max_builders: 15
  max_podcasts: 2
  max_blogs: 3

# ── Labels ──
labels:
  builderInsights: { en: 'BUILDER INSIGHTS', zh: '实干者说', ja: 'ビルダーの声' }
  podcastHighlights: { en: 'PODCAST HIGHLIGHTS', zh: '播客精选', ja: 'ポッドキャスト' }
  blogUpdates: { en: 'BLOG UPDATES', zh: '官方博客', ja: '公式ブログ' }
  archive: { en: 'ARCHIVE', zh: '往期', ja: 'アーカイブ' }
  backToday: { en: 'BACK TO TODAY', zh: '返回今日', ja: '今日に戻る' }
  empty: { en: 'NO UPDATES TODAY.', zh: '// 今日无更新', ja: '// 本日更新なし' }
  sources: { en: 'builders tracked', zh: '位建设者已追踪', ja: '人のビルダーをウォッチ中' }
  fromSources: { en: 'SRC', zh: '来源', ja: 'SRC' }
  subscribe: { en: 'SUBSCRIBE', zh: '订阅', ja: '購読' }
  emailPlaceholder: { en: 'you@example.com', zh: '你的邮箱', ja: 'メールアドレス' }
  stayUpdated: { en: 'STAY UPDATED', zh: '保持关注', ja: '最新情報を受け取る' }
  stayUpdatedDesc:
    en: 'Daily builder insights, straight to your inbox.'
    zh: '每日建设者洞察，直达邮箱。'
    ja: 'ビルダーインサイトをメールで毎日お届け。'
  cta: { en: 'READ FULL DIGEST', zh: '阅读完整日报', ja: '全文を読む' }

# ── Sponsor (optional) ──
sponsor: null

# ── Newsletter (optional) ──
newsletter:
  provider: buttondown
  username: thewang

# ── About Page ──
about:
  title: { en: 'HOW IT WORKS', zh: '运作方式', ja: '仕組み' }
  overview:
    en: 'This digest tracks 25+ top AI builders across X/Twitter, podcasts, and blogs. Every day, the system fetches content from curated feeds, remixes it with AI into structured summaries, and translates to three languages.'
    zh: '本日报追踪 25+ 位顶级 AI 建设者在 X/Twitter、播客和博客上的动态。系统每天从策划的信息源获取内容，通过 AI 生成结构化摘要，并翻译为三种语言。'
    ja: 'X/Twitter・ポッドキャスト・ブログで活躍するトップAIビルダー25人以上を毎日ウォッチ。厳選フィードからコンテンツを収集し、AIが要約を作成、3言語に翻訳してお届けします。'
  policyAudience:
    en: 'Target audience: builders, engineers, and founders in AI.'
    zh: '目标读者：AI 领域的建设者、工程师和创始人。'
    ja: '対象読者：AIのビルダー、エンジニア、創業者。'
  disclaimer:
    en: 'Summaries are generated by AI and may contain inaccuracies. All original content belongs to their respective creators.'
    zh: '摘要由 AI 生成，可能存在不准确之处。所有原始内容版权归各自创作者所有。'
    ja: '要約はAIにより生成されており、不正確な場合があります。すべてのオリジナルコンテンツは各クリエイターに帰属します。'

# ── Schedule ──
schedule:
  cron: '0 7 * * *'
